model_name: fasttext_transformer

datasets:
  sst2:
    hf_path: stanfordnlp/sst2
    text_col: sentence
    label_col: label
    class_names: [negative, positive]
    train_split: train
    test_split: validation  # test split has no labels in GLUE
    train_size: 10000
    val_size: 2000

  imdb:
    hf_path: stanfordnlp/imdb
    text_col: text
    label_col: label
    class_names: [negative, positive]
    train_split: train
    test_split: test
    train_size: 10000
    val_size: 2000
    test_size: 2000

  amazon:
    hf_path: goosmanlei/amazon_reviews_multi
    text_col: review_body
    title_col: review_title
    label_col: stars
    label_offset: -1
    class_names: ["1star", "2stars", "3stars", "4stars", "5stars"]
    train_split: train
    test_split: test
    train_size: 10000
    val_size: 2000
    test_size: 2000
    hf_config: en
    categorical_cols:
      product_category: null  # vocab size inferred from training data

  ag_news:
    hf_path: fancyzhx/ag_news
    text_col: text
    label_col: label
    class_names: [World, Sports, Business, Sci/Tech]
    train_split: train
    test_split: test
    train_size: 10000
    val_size: 2000

  20newsgroups:
    hf_path: SetFit/20_newsgroups
    text_col: text
    label_col: label
    class_names: [alt.atheism, comp.graphics, comp.os.ms-windows.misc, comp.sys.ibm.pc.hardware,
                  comp.sys.mac.hardware, comp.windows.x, misc.forsale, rec.autos, rec.motorcycles,
                  rec.sport.baseball, rec.sport.hockey, sci.crypt, sci.electronics, sci.med,
                  sci.space, soc.religion.christian, talk.politics.guns, talk.politics.mideast,
                  talk.politics.misc, talk.religion.misc]
    train_split: train
    test_split: test
    train_size: 10000
    val_size: 2000
    test_size: 2000

  subj:
    hf_path: SetFit/subj
    text_col: text
    label_col: label
    class_names: [objective, subjective]
    train_split: train
    test_split: test
    train_size: 10000
    val_size: 2000
    test_size: 2000

  clinc150:
    hf_path: DeepPavlov/clinc150
    text_col: utterance
    label_col: label
    train_split: train
    test_split: test
    train_size: 10000
    val_size: 2000
    test_size: 2000
    oos_label: 150

tokenizer:
  type: ngram
  min_count: 1
  min_n: 3
  max_n: 6
  num_tokens: 100000
  len_word_ngrams: 1

model:
  embedding_dim: 128
  aggregation_method: mean
  attention_config:
    n_layers: 2
    n_head: 4
    n_kv_head: 4
    positional_encoding: true
    sequence_len: 256

training:
  num_epochs: 10
  batch_size: 64
  lr: 0.001
  patience_early_stopping: 3
  num_workers: 0

seed: 42
